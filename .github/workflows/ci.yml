name: Akashi CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─── 1. Quality & Formatting Gate ─────────────────────────────────────────
  lint-and-format:
    name: Lint & Format Check (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff Lint Check
        run: ruff check akashi-backend/

      - name: Run Ruff Format Check
        run: ruff format --check akashi-backend/

  # ─── 2. Secret Scan Compliance ────────────────────────────────────────────
  secrets-scanner:
    name: Secrets Detection (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history required for git leak tracking

      - name: TruffleHog OSS Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # ─── 3. Backend Test Suite & Coverage Gate ─────────────────────────────────
  pytest-suite:
    name: Pytest Integration Gates
    runs-on: ubuntu-latest
    needs: [lint-and-format]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r akashi-backend/requirements.txt pytest pytest-asyncio pytest-cov

      - name: Run Pytest with Coverage Report
        working-directory: ./akashi-backend
        env:
          SUPABASE_URL: "https://mock-supabase-akashi.supabase.co"
          SUPABASE_KEY: "mock-supabase-service-key-for-frictionless-testing-akashi-pipeline"
          JWT_SECRET: "mock-jwt-secret-key-gate-akashi"
          GEMINI_API_KEY: "mock-gemini-intelligence-key-akashi"
        run: |
          python -m pytest --cov=app --cov-report=xml --cov-fail-under=80

      - name: Upload Coverage Results
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: akashi-backend/coverage.xml
