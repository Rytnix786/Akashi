name: akashi_app
description: "আকাশি - Satellite-powered crop health monitoring for Bangladeshi farmers"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ─── Maps & Geo ────────────────────────────────────────────────────────────
  flutter_map: ^7.0.0
  latlong2: ^0.9.0

  # ─── HTTP ──────────────────────────────────────────────────────────────────
  dio: ^5.4.0

  # ─── State Management ──────────────────────────────────────────────────────
  provider: ^6.1.2

  # ─── Supabase (Auth + DB) ──────────────────────────────────────────────────
  supabase_flutter: ^2.5.0

  # ─── Firebase (FCM Push Notifications) ─────────────────────────────────────
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0

  # ─── Storage ───────────────────────────────────────────────────────────────
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # ─── Location ──────────────────────────────────────────────────────────────
  geolocator: ^11.0.0
  permission_handler: ^11.3.0

  # ─── UI ────────────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # ─── Utilities ─────────────────────────────────────────────────────────────
  intl: ^0.20.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
  
  fonts:
    - family: NotoSansBengali
      fonts:
        - asset: assets/fonts/NotoSansBengali-Regular.ttf
        - asset: assets/fonts/NotoSansBengali-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansBengali-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSansBengali-Bold.ttf
          weight: 700
